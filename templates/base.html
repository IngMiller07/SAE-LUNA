<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Sistema de Alertas{% endblock %} · SAE</title>
  <meta name="description" content="Sistema de Alertas Tempranas para detección de estudiantes en riesgo académico." />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>" />
  {% block head %}{% endblock %}
</head>
<body>

<!-- ─── NAVBAR ─── -->
<nav class="navbar">
  <a href="{{ url_for('dashboard') }}" class="navbar-brand">
    <div class="brand-icon">🎓</div>
    <span>SAE</span>
  </a>

  <a href="{{ url_for('dashboard') }}"
     class="nav-link {% if request.endpoint == 'dashboard' %}active{% endif %}">
    📊 <span>Dashboard</span>
  </a>
  <a href="{{ url_for('students') }}"
     class="nav-link {% if request.endpoint in ['students', 'student_detail'] %}active{% endif %}">
    👥 <span>Estudiantes</span>
  </a>
  <a href="{{ url_for('alerts') }}"
     class="nav-link {% if request.endpoint == 'alerts' %}active{% endif %}">
    🔔 <span>Alertas</span>
  </a>
  <a href="{{ url_for('chatbot') }}"
     class="nav-link {% if request.endpoint == 'chatbot' %}active{% endif %}">
    🤖 <span>Chatbot</span>
  </a>
</nav>

<!-- ─── TOAST CONTAINER ─── -->
<div class="toast-container" id="toastContainer"></div>

<!-- ─── MAIN CONTENT ─── -->
{% block content %}{% endblock %}

<!-- ─── GLOBAL SCRIPTS ─── -->
<script>
  function showToast(message, type = 'info') {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.textContent = message;
    container.appendChild(toast);
    setTimeout(() => {
      toast.style.animation = 'fadeOut 0.3s ease forwards';
      setTimeout(() => toast.remove(), 300);
    }, 3500);
  }
</script>
{% block scripts %}{% endblock %}
</body>
</html>
